name: Pull Latest Code

on:
  push:
    branches:
      - main

jobs:
  pull-code:
    runs-on: self-hosted
    steps:
      - name: Git Fetch and Pull
        run: |
          cd /home/cse438/trendyol-clone/repos/restaurant-service
          git fetch origin
          git pull origin main
      - name: Docker Build and Up
        run: |
          cd /home/cse438/trendyol-clone
          docker compose up -d --build restaurant-service
